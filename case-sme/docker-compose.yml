version: '3.8'

services:
  postgres:
    build:
      context: ./docker/postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - sme_network

  airflow-postgres:
    image: postgres:16
    ports:
      - "${AIRFLOW_PG_PORT:-5433}:5432"
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=${AIRFLOW_PG_USER}
      - POSTGRES_PASSWORD=${AIRFLOW_PG_PASSWORD}
      - POSTGRES_DB=${AIRFLOW_PG_DB}
    networks:
      - sme_network

  airflow-init:
    build:
      context: .
      dockerfile: ./docker/airflow/Dockerfile
    command: bash -c "airflow db migrate && airflow users create --username ${AIRFLOW_ADMIN_USER:-airflow} --password ${AIRFLOW_ADMIN_PASSWORD:-airflow} --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - DLT_PROJECT_DIR=/opt/airflow/dlt_pipelines
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dlt_pipelines:/opt/airflow/dlt_pipelines
      - ./transform_dbt:/opt/airflow/transform_dbt
      - ./transform_ibis:/opt/airflow/transform_ibis
      - ./seed:/opt/airflow/seed
    networks:
      - sme_network

  airflow-webserver:
    build:
      context: .
      dockerfile: ./docker/airflow/Dockerfile
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DLT_PROJECT_DIR=/opt/airflow/dlt_pipelines
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dlt_pipelines:/opt/airflow/dlt_pipelines
      - ./transform_dbt:/opt/airflow/transform_dbt
      - ./transform_ibis:/opt/airflow/transform_ibis
      - ./seed:/opt/airflow/seed
      - airflow_logs:/opt/airflow/logs
    networks:
      - sme_network

  airflow-scheduler:
    build:
      context: .
      dockerfile: ./docker/airflow/Dockerfile
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DLT_PROJECT_DIR=/opt/airflow/dlt_pipelines
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dlt_pipelines:/opt/airflow/dlt_pipelines
      - ./transform_dbt:/opt/airflow/transform_dbt
      - ./transform_ibis:/opt/airflow/transform_ibis
      - ./seed:/opt/airflow/seed
      - airflow_logs:/opt/airflow/logs
    networks:
      - sme_network

  streamlit:
    build:
      context: .
      dockerfile: ./docker/streamlit/Dockerfile
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./dashboard:/app
    networks:
      - sme_network

volumes:
  postgres_data:
  airflow_pg_data:
  airflow_logs:

networks:
  sme_network:
    driver: bridge
