enterprise_pji:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: /data/duckdb/pji_analytics.duckdb
      extensions:
        - iceberg
        - httpfs
      settings:
        s3_endpoint: "minio:9000"
        s3_access_key_id: "minioadmin"
        s3_secret_access_key: "minioadmin"
        s3_use_ssl: false
        s3_url_style: "path"
        unsafe_enable_version_guessing: true
      threads: 4
